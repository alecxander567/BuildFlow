<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" fill="none">
  <!-- Antenna -->
  <line x1="60" y1="8" x2="60" y2="22" stroke="#E8610A" stroke-width="3" stroke-linecap="round"/>
  <circle cx="60" cy="6" r="4" fill="#E8610A"/>

  <!-- Head -->
  <rect x="22" y="22" width="76" height="58" rx="18" fill="#F5F0EB" stroke="#E8E0D8" stroke-width="1.5"/>

  <!-- Eyes -->
  <circle cx="43" cy="45" r="8" fill="white" stroke="#E8E0D8" stroke-width="1"/>
  <circle cx="77" cy="45" r="8" fill="white" stroke="#E8E0D8" stroke-width="1"/>
  <circle cx="44" cy="46" r="4" fill="#E8610A"/>
  <circle cx="78" cy="46" r="4" fill="#E8610A"/>
  <circle cx="45.5" cy="44.5" r="1.5" fill="white"/>
  <circle cx="79.5" cy="44.5" r="1.5" fill="white"/>

  <!-- Smile -->
  <path d="M46 62 Q60 72 74 62" stroke="#E8610A" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Neck -->
  <rect x="52" y="80" width="16" height="8" rx="3" fill="#EDE8E2"/>

  <!-- Body -->
  <rect x="18" y="88" width="84" height="54" rx="18" fill="#F5F0EB" stroke="#E8E0D8" stroke-width="1.5"/>

  <!-- Chest badge / screen -->
  <rect x="36" y="100" width="48" height="30" rx="10" fill="white" stroke="#E8E0D8" stroke-width="1"/>
  <!-- Mini taskbar lines on screen -->
  <rect x="43" y="107" width="20" height="3" rx="1.5" fill="#E8610A" opacity="0.7"/>
  <rect x="43" y="113" width="28" height="3" rx="1.5" fill="#EDE8E2"/>
  <rect x="43" y="119" width="14" height="3" rx="1.5" fill="#EDE8E2"/>
  <!-- Check icon -->
  <circle cx="68" cy="114" r="7" fill="#FEF0E7"/>
  <polyline points="64.5,114 67,116.5 71.5,111" stroke="#E8610A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Left arm -->
  <rect x="2" y="92" width="16" height="36" rx="8" fill="#F5F0EB" stroke="#E8E0D8" stroke-width="1.5"/>
  <!-- Right arm -->
  <rect x="102" y="92" width="16" height="36" rx="8" fill="#F5F0EB" stroke="#E8E0D8" stroke-width="1.5"/>

  <!-- Left hand dot -->
  <circle cx="10" cy="132" r="4" fill="#E8610A" opacity="0.6"/>
  <!-- Right hand dot -->
  <circle cx="110" cy="132" r="4" fill="#E8610A" opacity="0.6"/>

  <!-- Legs -->
  <rect x="34" y="142" width="18" height="14" rx="7" fill="#EDE8E2" stroke="#E8E0D8" stroke-width="1"/>
  <rect x="68" y="142" width="18" height="14" rx="7" fill="#EDE8E2" stroke="#E8E0D8" stroke-width="1"/>
</svg>
